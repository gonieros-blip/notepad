<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- 왼쪽 사이드바 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="#00a82d"/><path d="M6 8h12M6 12h8M6 16h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Notepad</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-view="all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 5h18M3 10h18M3 15h14M3 20h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          모든 노트
        </div>
        <div class="nav-item" data-view="pinned">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          즐겨찾기
        </div>
      </nav>

      <div class="sidebar-section">
        <div class="section-header">
          <span>노트북</span>
          <button id="btn-add-notebook" title="노트북 추가">+</button>
        </div>
        <div id="notebook-list"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-header"><span>태그</span></div>
        <div id="tag-list"></div>
      </div>
    </aside>

    <!-- 노트 목록 -->
    <section id="note-list-panel">
      <div class="panel-header">
        <div class="panel-title" id="panel-title">모든 노트</div>
        <div class="panel-actions">
          <input type="search" id="search-input" placeholder="검색..." />
          <button id="btn-new-note" title="새 노트">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div id="note-list"></div>
    </section>

    <!-- 에디터 -->
    <main id="editor-panel">
      <div id="editor-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#ccc" stroke-width="1.5"/><polyline points="14 2 14 8 20 8" stroke="#ccc" stroke-width="1.5"/></svg>
        <p>노트를 선택하거나 새 노트를 만드세요</p>
      </div>
      <div id="editor-content" class="hidden">
        <div id="editor-toolbar">
          <div class="toolbar-meta">
            <select id="note-notebook-select"></select>
            <button id="btn-pin" title="즐겨찾기">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button id="btn-delete-note" title="노트 삭제" class="danger">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.5"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
          <div class="format-buttons">
            <button data-cmd="bold"><b>B</b></button>
            <button data-cmd="italic"><i>I</i></button>
            <button data-cmd="underline"><u>U</u></button>
            <button data-cmd="strikeThrough"><s>S</s></button>
            <span class="sep"></span>
            <button data-cmd="insertUnorderedList">• 목록</button>
            <button data-cmd="insertOrderedList">1. 목록</button>
            <span class="sep"></span>
            <select id="heading-select">
              <option value="">본문</option>
              <option value="h1">제목 1</option>
              <option value="h2">제목 2</option>
              <option value="h3">제목 3</option>
            </select>
          </div>
        </div>
        <input type="text" id="note-title" placeholder="제목" />
        <div id="note-tags">
          <div id="tags-display"></div>
          <input type="text" id="tag-input" placeholder="태그 추가 (Enter)" />
        </div>
        <div id="note-body" contenteditable="true" spellcheck="false"></div>
        <div id="editor-meta">
          <span id="note-date"></span>
          <span id="save-status"></span>
        </div>
      </div>
    </main>
  </div>

  <!-- 노트북 추가 모달 -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-title">노트북 추가</h3>
      <input type="text" id="modal-input" placeholder="노트북 이름" />
      <div class="modal-actions">
        <button id="modal-cancel">취소</button>
        <button id="modal-confirm" class="primary">확인</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
